<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="6" stdDeviation="6" flood-opacity="0.3" flood-color="#000000"/>
    </filter>
  </defs>
  <!-- Background with rounded corners for web -->
  <rect width="512" height="512" rx="115" fill="url(#bg)" />
  
  <!-- Number 3 -->
  <text x="210" y="390" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="340" fill="#ffffff" text-anchor="middle">3</text>
  
  <!-- Checkmark -->
  <g filter="url(#shadow)">
      <path d="M 230 290 L 320 380 L 470 160" fill="none" stroke="#ffffff" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 230 290 L 320 380 L 470 160" fill="none" stroke="#22c55e" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>